# agent-repo-standard — copier template
# Usage: copier copy --trust gh:tahabakhit/agent-repo-standard <dest>   (or a local path)
# --trust is required because this template runs post-generation tasks
# (git init, type-specific scaffolding, optional spec-kit bootstrap).

_subdirectory: template

_message_after_copy: |
  Repo scaffolded to the shared Repo Standard.
  Next:
    - Review .specify/memory/constitution.md and set the ratified date.
    - Run /spex:init in Claude Code to add the spex extensions.
    - Fill docs/ (Diátaxis) and write your first ADR from docs/decisions/adrs/adr-template.md.

project_name:
  type: str
  help: Human-readable project name (e.g. "CAM Semantic Models")

project_slug:
  type: str
  help: Repo / directory slug
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

description:
  type: str
  help: One-line description of what this repo is
  default: ""

repo_type:
  type: str
  help: What kind of repo is this?
  choices:
    Data / config source-of-truth (no src/): data
    Application / service code (src/ + tests): code
    Installable library / package: library
  default: code

package_name:
  type: str
  help: Python package name (code/library only)
  default: "{{ project_slug | replace('-', '_') }}"
  when: "{{ repo_type != 'data' }}"

code_owner:
  type: str
  help: 'Default CODEOWNERS owner (e.g. "@org/team"); blank to skip'
  default: ""

bootstrap_speckit:
  type: bool
  help: Run `specify init` (spec-kit) after scaffolding, if the CLI is present?
  default: true

_tasks:
  # Initialize git if needed
  - "git rev-parse --is-inside-work-tree >/dev/null 2>&1 || git init -q"
  # Type-specific scaffolding for code / library repos
  - >
    {% if repo_type != 'data' %}
    mkdir -p src/{{ package_name }} tests &&
    printf '' > src/{{ package_name }}/__init__.py &&
    printf '' > tests/.gitkeep &&
    printf '[pytest]\ntestpaths = tests\n' > pytest.ini
    {% else %}true{% endif %}
  - >
    {% if repo_type == 'library' %}
    printf '[project]\nname = "{{ project_slug }}"\nversion = "0.0.0"\ndescription = "{{ description }}"\nrequires-python = ">=3.11"\n' > pyproject.toml
    {% else %}true{% endif %}
  # Optional spec-kit bootstrap for all three agents + git/auto-commit extension.
  # NOTE: spex *extensions* (gates, deep-review, teams, collab, brainstorm) ship Claude-only
  # command formats; copilot/codex get core spec-kit commands. Generated surfaces are gitignored.
  # Preserves our populated constitution across the multiple inits.
  - >
    {% if bootstrap_speckit %}
    if command -v specify >/dev/null 2>&1; then
      cp .specify/memory/constitution.md /tmp/const.$$ 2>/dev/null || true;
      specify init --here --integration claude --force || true;
      specify init --here --integration copilot --force || true;
      specify init --here --integration codex --integration-options="--skills" --force || true;
      specify extension add git || true;
      cp /tmp/const.$$ .specify/memory/constitution.md 2>/dev/null || true;
      rm -f /tmp/const.$$;
    else
      echo 'NOTE: `specify` not on PATH — run /spex:init (Claude) or `specify init --integration <agent>` per agent.';
    fi
    {% else %}true{% endif %}
