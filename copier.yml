# Optional legacy fixed-layout generator for new, empty destinations only.
# The supported entrypoint is bin/new-repo.sh. Existing-repository adoption and
# Copier's project-update workflow are unsupported.

_subdirectory: template
_min_copier_version: "9.17.0"

_message_after_copy: |
  New repository generated with the optional legacy fixed layout.
  Next:
    - Review README.md and AGENTS.md.
    - Run bin/validate-repository.sh.
    - Keep local agent tooling and secrets out of tracked files.

project_name:
  type: str
  help: Human-readable project name (e.g. "CAM Semantic Models")

project_slug:
  type: str
  help: Repo / directory slug
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  validator: >-
    {% if not (project_slug | regex_search('^[a-z][a-z0-9-]*$')) %}
    Use lowercase letters, digits, and dashes; start with a letter.
    {% endif %}

description:
  type: str
  help: One-line description of what this repo is
  default: ""

project_inputs:
  type: str
  help: What versioned source material does this project take in?

project_outputs:
  type: str
  help: What tracked deliverables does this project produce?

non_goals:
  type: str
  help: What is explicitly out of scope for this project?

repo_type:
  type: str
  help: Which fixed legacy profile should be generated?
  choices:
    Data / config source-of-truth (no src/): data
    "Workspace: docs, research, or design (no src/)": workspace
    Python application / service (src/ + tests): code
    Installable Python library / package: library
  default: code

package_name:
  type: str
  help: Python import package name (code/library only)
  default: "{{ project_slug | replace('-', '_') }}"
  when: "{{ repo_type in ['code', 'library'] }}"
  validator: >-
    {% if repo_type in ['code', 'library'] and not (package_name | regex_search('^[A-Za-z_][A-Za-z0-9_]*$')) %}
    Use a valid Python identifier.
    {% endif %}

code_owner:
  type: str
  help: 'Default CODEOWNERS owner (e.g. "@org/team"); blank to skip'
  default: ""

_tasks:
  # Initialize this destination, not a parent worktree.
  - "test -d .git || git init -q"
  # These directory operations do not replace files. The supported wrapper
  # rejects non-empty destinations before Copier starts.
  - "mkdir -p data/local deliverables artifacts"
