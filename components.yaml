schema_version: 1
components:
  - id: amanar-harness
    path: harness
    authority: repository-scoped harnessing only
    validation: python3 harness/tests/validate-harness.py
  - id: amanar-workflow
    path: workflow
    authority: instructional and project-scoped lifecycle work
    validation: python3 workflow/tests/validate-workflow.py
  - id: amanar-backpressure
    path: harness/backpressure
    authority: per-repo pre-commit gate; installs only into a repo's own .git/hooks
    validation: python3 -m unittest discover -s harness/backpressure/tests
  - id: amanar-sync-skills
    path: harness/sync-skills
    authority: opt-in local skill linking into host skill dirs; no other user config
    validation: python3 -m unittest discover -s harness/sync-skills/tests
  - id: amanar-workflow-kernel
    path: workflow/kernel
    authority: deterministic host-independent workflow contract, controller, and check receipts
    validation: npm test --prefix workflow/kernel
  - id: amanar-workflow-loop
    path: workflow/loop
    authority: bounded-loop runner that drives the controller; adds no host authority
    validation: npm test --prefix workflow/loop
  - id: amanar-knowledge
    path: knowledge
    authority: portable stateless knowledge-save CLI; writes only to the user-configured store directory, never to the caller repo
    validation: npm test --prefix knowledge
  - id: amanar-pi
    path: harness/pi
    authority: portable Pi extension; registers amanar skills, injects a one-time light bootstrap, and applies in-session backpressure; no estate specifics
    validation: npm test --prefix harness/pi
  - id: amanar-claude
    path: harness/claude
    authority: portable Claude Code plugin; skills mount-point + PreToolUse backpressure gate reusing the Pi classifier; no estate specifics
    validation: npm test --prefix harness/claude
  - id: amanar-workflow-agent-eval
    path: workflow/agent-eval
    authority: local evaluation records and deterministic evaluator tooling
    validation: npm test --prefix workflow/agent-eval && npm run check --prefix workflow/agent-eval
