name: Eval Amanar

# The eval case runner is the regression harness — run in CI, kept out of the
# `make validate` gate. Its framework and the verify-gate mutation suite are
# unit-tested inside the gate; this job runs the full five suites.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - run: npm ci
      - run: node bin/amanar eval
