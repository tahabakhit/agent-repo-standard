name: Validate toolkit

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-ci.txt
      - name: Install pinned Copier
        run: python -m pip install --requirement tests/requirements-ci.txt
      - name: Validate deterministic toolkit structure
        run: python3 tests/validate-toolkit.py
      - name: Render and validate every legacy profile
        run: tests/verify-template.sh
      - name: Check patch whitespace
        run: git diff --check
